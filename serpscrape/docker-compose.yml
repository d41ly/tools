services:
  # Bundled PostgreSQL 16. OPTIONAL — only starts with the "bundled-db" profile:
  #   docker compose --profile bundled-db up -d --build
  # To use a PostgreSQL cluster on the host instead (e.g. PG18), leave the profile
  # off and point DATABASE_URL at host.docker.internal (see .env.example):
  #   docker compose up -d --build
  db:
    image: postgres:16-alpine
    profiles: ["bundled-db"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    # Lets the container reach a PostgreSQL cluster running on the host machine
    # (e.g. PG18) via host.docker.internal. Harmless when using the bundled db.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      UI_HOSTNAME: ${UI_HOSTNAME}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      SCRAPER_HEADFUL: ${SCRAPER_HEADFUL:-1}
    ports:
      - "8000:8000"
    # No depends_on by design: the entrypoint waits for DATABASE_URL to become
    # reachable, so the app works against either the bundled db or a host cluster.

volumes:
  pgdata:
